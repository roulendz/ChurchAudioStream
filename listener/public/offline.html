<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>Church Audio Stream - Offline</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #1a1a2e;
        color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        text-align: center;
        -webkit-font-smoothing: antialiased;
      }

      .offline-container {
        max-width: 360px;
      }

      .wifi-icon {
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
        opacity: 0.7;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 12px;
        color: #ffffff;
      }

      p {
        font-size: 1rem;
        line-height: 1.5;
        margin-bottom: 32px;
        color: #a0a0b0;
      }

      .retry-button {
        display: inline-block;
        padding: 12px 32px;
        font-size: 1rem;
        font-weight: 500;
        color: #ffffff;
        background-color: #4a4a6a;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.2s ease;
        -webkit-tap-highlight-color: transparent;
      }

      .retry-button:hover,
      .retry-button:active {
        background-color: #5a5a7a;
      }
    </style>
  </head>
  <body>
    <div class="offline-container">
      <svg class="wifi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1.42 9a16 16 0 0 1 21.16 0" />
        <path d="M5.3 13a10.5 10.5 0 0 1 13.4 0" />
        <path d="M9.17 17a5 5 0 0 1 5.66 0" />
        <circle cx="12" cy="21" r="1" fill="currentColor" />
        <line x1="2" y1="2" x2="22" y2="22" stroke="#e74c3c" stroke-width="2" />
      </svg>
      <h1>No Connection</h1>
      <p>Connect to the church WiFi to listen to live translations.</p>
      <button class="retry-button" onclick="location.reload()">Try Again</button>
    </div>
  </body>
</html>
