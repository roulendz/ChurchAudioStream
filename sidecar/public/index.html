<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Church Audio Stream</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 2rem;
      }
      .container {
        max-width: 480px;
      }
      h1 {
        font-size: 2rem;
        color: #ffffff;
        margin-bottom: 0.75rem;
        font-weight: 300;
        letter-spacing: 0.05em;
      }
      .subtitle {
        font-size: 1.1rem;
        color: #a0a0c0;
        margin-bottom: 2rem;
        line-height: 1.5;
      }
      .server-url {
        font-family: "Courier New", Courier, monospace;
        background: #16213e;
        border: 1px solid #2a2a4a;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1.5rem;
        font-size: 0.95rem;
        color: #7ec8e3;
        word-break: break-all;
      }
      .status-indicator {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
        padding: 0.5rem 1rem;
        border-radius: 20px;
        background: #16213e;
        border: 1px solid #2a2a4a;
      }
      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #666;
        transition: background 0.3s ease;
      }
      .status-dot.connected {
        background: #4caf50;
      }
      .status-dot.disconnected {
        background: #f44336;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Church Audio Stream</h1>
      <p class="subtitle">
        Listener web app coming soon.<br />The server is running!
      </p>
      <div class="server-url" id="serverUrl"></div>
      <div class="status-indicator">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Connecting...</span>
      </div>
    </div>
    <script>
      document.getElementById("serverUrl").textContent = window.location.href;

      var statusDot = document.getElementById("statusDot");
      var statusText = document.getElementById("statusText");

      function connectWebSocket() {
        var protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        var wsUrl = protocol + "//" + window.location.host;
        var ws = new WebSocket(wsUrl);

        ws.onopen = function () {
          statusDot.className = "status-dot connected";
          statusText.textContent = "Connected";
        };

        ws.onclose = function () {
          statusDot.className = "status-dot disconnected";
          statusText.textContent = "Disconnected";
          setTimeout(connectWebSocket, 3000);
        };

        ws.onerror = function () {
          statusDot.className = "status-dot disconnected";
          statusText.textContent = "Connection error";
        };

        ws.onmessage = function (event) {
          try {
            var msg = JSON.parse(event.data);
            if (msg.type === "welcome") {
              ws.send(
                JSON.stringify({
                  type: "identify",
                  payload: { role: "listener" },
                }),
              );
            }
          } catch (e) {
            // ignore parse errors
          }
        };
      }

      connectWebSocket();
    </script>
  </body>
</html>
